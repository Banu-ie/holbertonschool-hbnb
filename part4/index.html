<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBnB - Places</title>
  <link rel="icon" href="icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <img src="logo.png" alt="HBnB Logo" class="logo" />
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html" class="login-button" id="login-link">Login</a>
    </nav>
  </header>
  <main>
    <h1 class="section-title">Explore Places</h1>
    <p class="section-subtitle">Find your perfect stay anywhere in the world.</p>
    <div class="filter-bar">
      <label for="price-filter">Max price per night:</label>
      <select id="price-filter">
        <option value="10">$10</option>
        <option value="50">$50</option>
        <option value="100">$100</option>
        <option value="all" selected>All</option>
      </select>
    </div>
    <section id="places-list"></section>
  </main>
  <footer>
    <p>&copy; 2024 HBnB. All rights reserved.</p>
  </footer>
  <script src="scripts.js"></script>
</body>
</html>
