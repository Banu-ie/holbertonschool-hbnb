<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBnB - Place Details</title>
  <link rel="icon" href="icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <img src="logo.png" alt="HBnB Logo" class="logo" />
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html" class="login-button" id="login-link">Login</a>
    </nav>
  </header>

  <main>
    <section id="place-details" class="place-details">
      <p>Loading place details...</p>
    </section>

    <section class="reviews-section">
      <h2>Guest Reviews</h2>
      <div id="reviews-list"></div>
    </section>

    <section id="add-review" class="add-review hidden">
      <h2>Leave a Review</h2>
      <form id="review-form" class="form" novalidate>
        <div class="form-group">
          <label for="review-text">Your experience</label>
          <textarea id="review-text" name="review-text" placeholder="Share what you loved..." required></textarea>
        </div>
        <div class="form-group">
          <label for="rating">Rating (1-5)</label>
          <select id="rating" name="rating" required>
            <option value="">Select rating</option>
            <option value="1">⭐ 1 - Poor</option>
            <option value="2">⭐⭐ 2 - Fair</option>
            <option value="3">⭐⭐⭐ 3 - Good</option>
            <option value="4">⭐⭐⭐⭐ 4 - Very Good</option>
            <option value="5">⭐⭐⭐⭐⭐ 5 - Excellent</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">Submit Review</button>
        <div id="review-message" class="hidden"></div>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 HBnB. All rights reserved.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
